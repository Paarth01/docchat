<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #388bfd66;
      --user-bg: #23863633;
      --bot-bg: #21262d;
      --error: #f85149;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
    }
    code, .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.75rem;
      box-shadow: var(--shadow);
    }
    .brand {
      font-family: "IBM Plex Mono", monospace;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .brand span { color: var(--accent); }
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.8rem;
    }
    .panel h3 {
      margin: 0 0 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.25rem 0;
      gap: 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.on { background: #3fb950; box-shadow: 0 0 8px #3fb95088; }
    .dot.off { background: var(--error); }
    button {
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bot-bg);
      color: var(--text);
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      transition: border-color 0.15s, background 0.15s;
    }
    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #262c36;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      background: linear-gradient(180deg, #1f6feb22, #1f6feb11);
      border-color: var(--accent-dim);
    }
    .ingest-wrap { position: relative; }
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .spinner.on { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .radio {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .radio input { accent-color: var(--accent); }
    .sources-list {
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .sources-list li { margin: 0.15rem 0; word-break: break-all; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
      max-width: 420px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .empty-state strong { color: var(--text); }
    .msg {
      max-width: 78%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid #23863655;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid var(--border);
    }
    .msg.error {
      align-self: flex-start;
      border-color: #f8514966;
      background: #f8514914;
      color: #ffa198;
    }
    .sources-block {
      margin-top: 0.5rem;
      border-top: 1px dashed var(--border);
      padding-top: 0.5rem;
    }
    .sources-block summary {
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--accent);
      user-select: none;
    }
    .sources-block pre {
      margin: 0.5rem 0 0;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: pre-wrap;
    }
    .composer {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      background: var(--panel);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .composer textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
    }
    .composer textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }
    .typing {
      display: none;
      align-self: flex-start;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.35rem 0.75rem;
    }
    .typing.on { display: flex; align-items: center; gap: 0.35rem; }
    .typing .dots span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing .dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .ingest-toast {
      font-size: 0.72rem;
      color: var(--muted);
      min-height: 1rem;
    }
    .ingest-toast.ok { color: #3fb950; }
    .ingest-toast.err { color: var(--error); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Doc<span>Chat</span></div>
      <div class="panel">
        <h3>Status</h3>
        <div class="status-row">
          <span>Ollama</span>
          <span style="display:flex;align-items:center;gap:0.35rem;font-size:0.75rem;color:var(--muted);">
            <span id="ollamaDot" class="dot"></span>
            <span id="ollamaLabel">…</span>
          </span>
        </div>
        <div class="status-row">
          <span>Docs indexed</span>
          <span id="docCount" class="mono">—</span>
        </div>
        <div class="status-row">
          <span>Model</span>
          <span id="modelName" class="mono" style="font-size:0.72rem;max-width:120px;text-align:right;word-break:break-all;">—</span>
        </div>
      </div>
      <div class="ingest-wrap">
        <button type="button" class="primary" id="ingestBtn" style="width:100%;display:flex;align-items:center;justify-content:center;">
          Ingest PDFs
          <span id="ingestSpinner" class="spinner" aria-hidden="true"></span>
        </button>
        <div id="ingestToast" class="ingest-toast"></div>
      </div>
      <div class="panel">
        <h3>Pipeline</h3>
        <div class="radio-group">
          <label class="radio">
            <input type="radio" name="pipeline" value="graph" checked />
            Langgraph
          </label>
          <label class="radio">
            <input type="radio" name="pipeline" value="chain" />
            Langchain
          </label>
        </div>
      </div>
      <div class="panel" style="flex:1;min-height:0;display:flex;flex-direction:column;">
        <h3>Last sources</h3>
        <ul id="sourcesSidebar" class="sources-list mono" style="margin:0;padding-left:1.1rem;"></ul>
      </div>
      <p class="hint">Drop PDFs into <span class="mono">data/pdfs/</span> then click Ingest.</p>
    </aside>
    <main class="main">
      <div id="chat" class="chat">
        <div id="empty" class="empty-state">
          <strong>Local RAG, offline-first.</strong><br />
          Drop PDFs into <span class="mono">data/pdfs/</span>, run <span class="mono">POST /ingest</span>, then ask questions here.
        </div>
      </div>
      <div id="typing" class="typing" aria-live="polite">
        <span>Thinking</span>
        <span class="dots"><span></span><span></span><span></span></span>
      </div>
      <form class="composer" id="composer">
        <textarea id="input" rows="1" placeholder="Ask about your documents…" autocomplete="off"></textarea>
        <button type="submit" class="primary" id="sendBtn">Send</button>
      </form>
    </main>
  </div>
  <script>
    const chat = document.getElementById("chat");
    const empty = document.getElementById("empty");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const typing = document.getElementById("typing");
    const ollamaDot = document.getElementById("ollamaDot");
    const ollamaLabel = document.getElementById("ollamaLabel");
    const docCount = document.getElementById("docCount");
    const modelName = document.getElementById("modelName");
    const ingestBtn = document.getElementById("ingestBtn");
    const ingestSpinner = document.getElementById("ingestSpinner");
    const ingestToast = document.getElementById("ingestToast");
    const sourcesSidebar = document.getElementById("sourcesSidebar");

    function scrollChat() {
      chat.scrollTop = chat.scrollHeight;
    }

    function useGraph() {
      const v = document.querySelector('input[name="pipeline"]:checked')?.value;
      return v !== "chain";
    }

    function splitAnswerSources(text) {
      const idx = text.search(/\n\s*Sources:\s*/i);
      if (idx === -1) return { body: text, sourcesText: "" };
      return { body: text.slice(0, idx).trimEnd(), sourcesText: text.slice(idx).trim() };
    }

    function appendUser(text) {
      if (empty) empty.remove();
      const el = document.createElement("div");
      el.className = "msg user mono";
      el.textContent = text;
      chat.appendChild(el);
      scrollChat();
    }

    function appendBot(answer, sourcesList, pipeline) {
      const el = document.createElement("div");
      el.className = "msg bot";
      const { body, sourcesText } = splitAnswerSources(answer);
      const header = document.createElement("div");
      header.textContent = body;
      el.appendChild(header);
      const meta = document.createElement("div");
      meta.style.marginTop = "0.35rem";
      meta.style.fontSize = "0.72rem";
      meta.style.color = "var(--muted)";
      meta.className = "mono";
      meta.textContent = "via " + (pipeline || "pipeline");
      el.appendChild(meta);

      const srcBlock = document.createElement("details");
      srcBlock.className = "sources-block";
      srcBlock.open = false;
      const sum = document.createElement("summary");
      sum.textContent = "Sources";
      srcBlock.appendChild(sum);
      const pre = document.createElement("pre");
      let block = sourcesText;
      if (!block && sourcesList && sourcesList.length) {
        block = "Sources:\n" + sourcesList.join("\n");
      }
      pre.textContent = block || "(none)";
      srcBlock.appendChild(pre);
      el.appendChild(srcBlock);
      chat.appendChild(el);
      scrollChat();
    }

    function appendError(msg) {
      if (empty) empty.remove();
      const el = document.createElement("div");
      el.className = "msg error mono";
      el.textContent = msg;
      chat.appendChild(el);
      scrollChat();
    }

    function setLoading(on) {
      typing.classList.toggle("on", on);
      input.disabled = on;
      sendBtn.disabled = on;
    }

    function setSidebarSources(list) {
      sourcesSidebar.innerHTML = "";
      (list || []).forEach((s) => {
        const li = document.createElement("li");
        li.textContent = s;
        sourcesSidebar.appendChild(li);
      });
    }

    async function refreshStatus() {
      try {
        const r = await fetch("/status");
        const j = await r.json();
        ollamaDot.classList.toggle("on", j.ollama_connected);
        ollamaDot.classList.toggle("off", !j.ollama_connected);
        ollamaLabel.textContent = j.ollama_connected ? "connected" : "down";
        docCount.textContent = String(j.documents_indexed ?? "—");
        modelName.textContent = j.model || "—";
      } catch {
        ollamaDot.className = "dot off";
        ollamaLabel.textContent = "error";
      }
    }

    refreshStatus();
    setInterval(refreshStatus, 30000);

    ingestBtn.addEventListener("click", async () => {
      ingestToast.textContent = "";
      ingestToast.className = "ingest-toast";
      ingestBtn.disabled = true;
      ingestSpinner.classList.add("on");
      try {
        const r = await fetch("/ingest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.detail || r.statusText || "Ingest failed");
        ingestToast.className = "ingest-toast ok";
        ingestToast.textContent = `Indexed ${j.chunks_created} chunk(s) from ${j.files_processed} file(s).`;
        await refreshStatus();
      } catch (e) {
        ingestToast.className = "ingest-toast err";
        ingestToast.textContent = String(e.message || e);
      } finally {
        ingestBtn.disabled = false;
        ingestSpinner.classList.remove("on");
      }
    });

    document.getElementById("composer").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      appendUser(q);
      input.value = "";
      setLoading(true);
      try {
        const r = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, use_graph: useGraph() }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          const msg = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail || j);
          throw new Error(msg || "Request failed");
        }
        appendBot(j.answer || "", j.sources || [], j.pipeline);
        setSidebarSources(j.sources || []);
        await refreshStatus();
      } catch (e) {
        appendError(String(e.message || e));
      } finally {
        setLoading(false);
      }
    });

    input.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) {
        ev.preventDefault();
        document.getElementById("composer").requestSubmit();
      }
    });
  </script>
</body>
</html>
